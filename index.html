<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Count Quest</title>
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7ff;
  text-align: center;
}

h1 {
  font-size: 36px;
}

#game {
  position: relative;
  height: 75vh;
  margin: 10px;
  background: white;
  border-radius: 20px;
  overflow: hidden;
}

.number {
  position: absolute;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  border: none;
  font-size: 30px;
  font-weight: bold;
  background: #4da6ff;
  color: white;
}

#start {
  font-size: 25px;
  padding: 15px 40px;
  border-radius: 15px;
  border: none;
  background: #33cc66;
  color: white;
}

#message {
  font-size: 30px;
  color: #ff6600;
}
</style>
</head>

<body>

<h1>Count Quest</h1>

<button onclick="setLevel(10)">Easy (1-10)</button>
<button onclick="setLevel(20)">Medium (1-20)</button>
<button onclick="setLevel(30)">Hard (1-30)</button>

<br><br>

<button id="start" onclick="startGame()">PLAY</button>

<h2 id="message"></h2>

<div id="game"></div>

<script>
let nextNumber = 1;
let maxNumber = 20;

function setLevel(level){
  maxNumber = level;
}
function speakNumber(number){
  let words = [
    "",
    "One","Two","Three","Four","Five",
    "Six","Seven","Eight","Nine","Ten",
    "Eleven","Twelve","Thirteen","Fourteen","Fifteen",
    "Sixteen","Seventeen","Eighteen","Nineteen","Twenty"
  ];

  let speech = new SpeechSynthesisUtterance(words[number]);
  speech.rate = 0.8;
  speech.pitch = 1.2;
  speechSynthesis.speak(speech);
}
function startGame(){

  let game = document.getElementById("game");
  game.innerHTML = "";
  document.getElementById("message").innerHTML = "";
  nextNumber = 1;

  let nums = [];

  for(let i=1;i<=maxNumber;i++){
    nums.push(i);
  }

  nums.sort(()=>Math.random()-0.5);

  nums.forEach(n=>{

    let b=document.createElement("button");
    b.className="number";
    b.innerHTML=n;

    let placed = false;

while (!placed) {
  let x = Math.random() * 75;
  let y = Math.random() * 75;
  let tooClose = false;

  document.querySelectorAll(".number").forEach(existing => {
    let ex = parseFloat(existing.style.left);
    let ey = parseFloat(existing.style.top);

    if (Math.abs(x - ex) < 15 && Math.abs(y - ey) < 15) {
      tooClose = true;
    }
  });

  if (!tooClose) {
    b.style.left = x + "%";
    b.style.top = y + "%";
    placed = true;
  }
}

    b.onclick=function(){

      if(n===nextNumber){

        speakNumber(n);

        b.style.display="none";
        nextNumber++;

        if(nextNumber===maxNumber+1){
          document.getElementById("message").innerHTML="Great Job!";
        }

      } else {
        document.getElementById("message").innerHTML="Try again!";
      }

    };

    game.appendChild(b);

  });
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
